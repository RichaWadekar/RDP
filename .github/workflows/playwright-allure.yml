name: E2E Admin Panel → Allure Report → Live Link

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test-and-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clean allure-results folder
        run: rm -rf allure-results || true

      - name: Run E2E Admin Panel Test
        run: |
          npx playwright test tests/E2E_Admin_All_Modules_With_Redirection.spec.js \
            --reporter=list,allure-playwright \
            --retries=2 \
            --timeout=120000
        continue-on-error: true
        timeout-minutes: 50
        env:
          CI: true
          PLAYWRIGHT_HEADLESS: true

      - name: Ensure allure-results exists
        if: always()
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "Creating allure-results with environment info..."
            mkdir -p allure-results
            cat > allure-results/environment.properties << EOF
          Browser=Chromium
          Environment=Stage
          URL=https://stage.rainydayparents.com
          Test.Suite=E2E Admin Panel Automation
          EOF
          fi

      - name: List allure-results
        if: always()
        run: |
          echo "=== Allure Results ==="
          ls -la allure-results/ || echo "No allure-results found"
          echo "=== File count ==="
          find allure-results -type f | wc -l || echo "0 files"

      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        if: always()
        run: |
          npx allure generate allure-results -o allure-report --clean
          echo "=== Allure Report Generated ==="
          ls -la allure-report/

      - name: Add custom index for better navigation
        if: always()
        run: |
          cat > allure-report/widgets/environment.json << EOF
          [
            {"name": "Test Suite", "value": "E2E Admin Panel - All Modules"},
            {"name": "Environment", "value": "Stage"},
            {"name": "URL", "value": "https://stage.rainydayparents.com"},
            {"name": "Browser", "value": "Chromium"},
            {"name": "Execution Date", "value": "$(date +'%Y-%m-%d %H:%M:%S UTC')"}
          ]
          EOF

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v4

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test-and-generate
    if: always()
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print Live Report URL
        run: |
          echo "=============================================="
          echo "🎉 ALLURE REPORT LIVE LINK:"
          echo "https://richawadekar.github.io/RDP-Automation/"
          echo "=============================================="
